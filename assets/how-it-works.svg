<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 620" role="img"
     aria-label="How Ballast levels audio: a global Core Audio process tap captures the whole mix and mutes the originals, buffered through an aggregate device and lock-free ring clocked by the output device, then levelled by the loudness engine and played to your speakers. In parallel, a second tap scoped to just Apple Music or Spotify captures the current track in isolation; the engine measures that music-only stream to decide the level and to learn each track into an on-disk library, so system sounds and other apps never skew a track's loudness.">
  <title>How Ballast levels your audio</title>
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; }
    .h { fill: #004080; font-weight: 700; font-size: 14px; }
    .b { fill: #3a4655; font-size: 11px; }
    .t { fill: #8a97a6; font-size: 10px; font-style: italic; }
    .title { fill: #004080; font-weight: 700; font-size: 19px; }
    .sub { fill: #6b7785; font-size: 11.5px; }
    .lab { fill: #6b7785; font-size: 10px; }
    .box { fill: #ffffff; stroke: #c9d6e5; stroke-width: 1.5; }
    .meas { fill: #f2f6fb; stroke: #c9d6e5; stroke-width: 1.5; }
    .arrow { stroke: #6b7785; stroke-width: 2; fill: none; }
  </style>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="6.5" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,4 L0,8 z" fill="#6b7785"/>
    </marker>
  </defs>

  <rect x="4" y="4" width="672" height="612" rx="16" fill="#ffffff" stroke="#e6ebf1" stroke-width="1.5"/>

  <text x="340" y="36" text-anchor="middle" class="title">How Ballast levels your audio</text>
  <text x="340" y="55" text-anchor="middle" class="sub">driver-free, measured and levelled entirely on-device</text>

  <!-- ── Left lane: the output path (levels everything you hear) ── -->
  <rect x="50" y="76" width="260" height="56" rx="11" class="box"/>
  <text x="180" y="99" text-anchor="middle" class="h">Every app&#8217;s audio</text>
  <text x="180" y="116" text-anchor="middle" class="b">Music, Spotify, browser, system</text>
  <text x="180" y="128" text-anchor="middle" class="t">the mixed output</text>
  <line x1="180" y1="132" x2="180" y2="160" class="arrow" marker-end="url(#a)"/>

  <rect x="50" y="160" width="260" height="56" rx="11" class="box"/>
  <text x="180" y="183" text-anchor="middle" class="h">Global process tap</text>
  <text x="180" y="200" text-anchor="middle" class="b">carries the mix, mutes the originals</text>
  <text x="180" y="212" text-anchor="middle" class="t">AudioHardwareCreateProcessTap</text>
  <line x1="180" y1="216" x2="180" y2="244" class="arrow" marker-end="url(#a)"/>

  <rect x="50" y="244" width="260" height="56" rx="11" fill="#d6e2f0" stroke="#c9d6e5" stroke-width="1.5"/>
  <text x="180" y="267" text-anchor="middle" class="h">Aggregate device + ring</text>
  <text x="180" y="284" text-anchor="middle" style="fill:#004080;font-size:11px">clocked by your output device</text>
  <text x="180" y="295" text-anchor="middle" style="fill:#35506e;font-size:9.5px;font-style:italic">input IOProc &#8594; lock-free ring &#8594; output IOProc</text>
  <line x1="180" y1="300" x2="180" y2="352" class="arrow" marker-end="url(#a)"/>
  <text x="188" y="329" class="lab">levels &amp; plays</text>

  <!-- ── Right lane: the measurement path (learns just the music) ── -->
  <rect x="370" y="76" width="260" height="56" rx="11" class="box"/>
  <text x="500" y="99" text-anchor="middle" class="h">Apple Music / Spotify</text>
  <text x="500" y="116" text-anchor="middle" class="b">the current track</text>
  <text x="500" y="128" text-anchor="middle" class="t">announces its track changes</text>
  <line x1="500" y1="132" x2="500" y2="160" class="arrow" marker-end="url(#a)"/>

  <rect x="370" y="160" width="260" height="56" rx="11" class="meas"/>
  <text x="500" y="183" text-anchor="middle" class="h">Isolated music tap</text>
  <text x="500" y="200" text-anchor="middle" class="b">measures the track alone</text>
  <text x="500" y="212" text-anchor="middle" class="t">a second, measurement-only tap</text>
  <line x1="500" y1="216" x2="500" y2="352" class="arrow" marker-end="url(#a)"/>
  <text x="508" y="290" class="lab">measures only the music</text>

  <!-- ── Loudness engine (both lanes converge) ── -->
  <rect x="50" y="352" width="580" height="82" rx="11" class="box"/>
  <text x="340" y="377" text-anchor="middle" class="h">Loudness engine</text>
  <text x="340" y="395" text-anchor="middle" class="b">levels the mix to your comfort level and guards the peak ceiling,</text>
  <text x="340" y="410" text-anchor="middle" class="b">setting the gain from the loudness it measures on the isolated music</text>
  <text x="340" y="425" text-anchor="middle" class="t">EBU R128 K-weighting, true-peak limiter</text>

  <line x1="180" y1="434" x2="180" y2="470" class="arrow" marker-end="url(#a)"/>
  <text x="188" y="457" class="lab">levelled</text>

  <!-- Output (terminal, most important) -->
  <rect x="50" y="470" width="260" height="62" rx="11" fill="#004080"/>
  <text x="180" y="498" text-anchor="middle" style="fill:#ffffff;font-weight:700;font-size:14px">Your speakers or headphones</text>
  <text x="180" y="518" text-anchor="middle" style="fill:#dce6f2;font-size:11px">every track at your comfort level</text>

  <!-- Loudness library (store) -->
  <rect x="370" y="470" width="260" height="62" rx="11" class="box"/>
  <text x="500" y="494" text-anchor="middle" class="h">Loudness library</text>
  <text x="500" y="511" text-anchor="middle" class="b">per-track loudness, saved on disk</text>
  <text x="500" y="524" text-anchor="middle" class="t">learns as you listen</text>
  <line x1="490" y1="434" x2="490" y2="468" class="arrow" marker-end="url(#a)"/>
  <line x1="512" y1="468" x2="512" y2="436" class="arrow" marker-end="url(#a)"/>

  <text x="340" y="575" text-anchor="middle" class="t">Track changes come from Apple Music / Spotify, so Ballast knows which track to learn &#8212; and it learns from the isolated music tap, so a notification or another app never skews a track&#8217;s level.</text>
</svg>
